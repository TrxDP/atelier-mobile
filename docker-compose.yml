version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: atelier-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: atelier_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - atelier-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d atelier_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: atelier-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - atelier-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  atelier-network:
    driver: bridge
