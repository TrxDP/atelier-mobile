version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: atelier-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: atelier_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - atelier-network

  redis:
    image: redis:7-alpine
    container_name: atelier-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - atelier-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  atelier-network:
    driver: bridge
